name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 18.170.35.34
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /var/www/html
            git fetch origin
            git reset --hard origin/main
